# buf code-generation configuration (ADR-14). `buf generate` (wrapped by
# `make generate` / scripts/generate) renders the .proto sources to Go under
# internal/gen/, consistent with ADR-12's rule that all implementation lives
# under internal/. The generated tree is verified diff-clean in CI, the same
# pattern scripts/render uses for rendered manifests.
version: v2
managed:
  enabled: true
  override:
    # Root the generated Go import paths at the module so `internal/gen`
    # packages import as github.com/holos-run/holos-paas/internal/gen/...
    - file_option: go_package_prefix
      value: github.com/holos-run/holos-paas/internal/gen
plugins:
  # protoc-gen-go renders the message types. paths=source_relative keeps the
  # generated file tree mirroring the proto/ tree rooted at internal/gen.
  - local: protoc-gen-go
    out: internal/gen
    opt: paths=source_relative
