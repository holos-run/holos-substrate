# Declarative k3d cluster configuration for the local "workload" cluster.
# Documentation: https://github.com/holos-run/holos/blob/main/doc/md/topics/local-cluster.mdx
#
# Apply with: scripts/local-k3d
# Or directly: k3d cluster create --config k3d/config.yaml
#
# Note: CLUSTER_NAME, REGISTRY_NAME, and REGISTRY_PORT environment variables
# control the cluster and registry names in scripts/local-k3d, but this static
# config file always uses "workload" and "k3d-registry.holos.localhost:5100".
# To override these values, edit this file directly rather than relying on the
# env vars (which only affect the delete/exist checks in the script, not the
# cluster shape defined here).
---
apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: workload
servers: 1
agents: 0
ports:
  - port: 80:80
    nodeFilters:
      - loadbalancer
  - port: 443:443
    nodeFilters:
      - loadbalancer
options:
  k3s:
    extraArgs:
      - arg: --disable=traefik
        nodeFilters:
          - server:0
registries:
  use:
    - k3d-registry.holos.localhost:5100
