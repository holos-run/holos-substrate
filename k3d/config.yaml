# Declarative k3d cluster configuration for the local "holos" cluster.
# Documentation: https://github.com/holos-run/holos/blob/main/doc/md/topics/local-cluster.mdx
#
# Apply with: scripts/local-k3d  (recommended — handles registry lifecycle)
# Or directly (defaults, cluster name taken from metadata.name below):
#   k3d cluster create --config k3d/config.yaml
---
apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: holos
servers: 1
ports:
  - port: 80:80
    nodeFilters:
      - loadbalancer
  - port: 443:443
    nodeFilters:
      - loadbalancer
options:
  k3s:
    extraArgs:
      - arg: --disable=traefik
        nodeFilters:
          - server:0
