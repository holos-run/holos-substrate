# Declarative k3d cluster configuration for the local "workload" cluster.
# Documentation: https://github.com/holos-run/holos/blob/main/doc/md/topics/local-cluster.mdx
#
# Apply with: scripts/local-k3d  (recommended — handles registry lifecycle)
# Or directly: k3d cluster create --config k3d/config.yaml \
#                --registry-use k3d-registry.holos.localhost:5100
#
# This file defines the static cluster shape: name, port mappings, and k3s
# args. The registry attachment is passed at runtime via --registry-use so
# that the REGISTRY_NAME and REGISTRY_PORT env vars in scripts/local-k3d
# are fully honored without requiring edits to this file.
---
apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: workload
servers: 1
ports:
  - port: 80:80
    nodeFilters:
      - loadbalancer
  - port: 443:443
    nodeFilters:
      - loadbalancer
options:
  k3s:
    extraArgs:
      - arg: --disable=traefik
        nodeFilters:
          - server:0
