apiVersion: batch/v1
kind: Job
metadata:
  labels:
    app.kubernetes.io/name: holos-paas-config-repo-bootstrap
  name: holos-paas-config-repo-bootstrap
  namespace: argocd
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: holos-paas-config-repo-bootstrap
    spec:
      containers:
      - command:
        - /bin/sh
        - -c
        - |-
          set -eu
          if kubectl -n argocd get secret holos-paas-config >/dev/null 2>&1; then
            echo "Secret holos-paas-config already exists in argocd; leaving it untouched."
            exit 0
          fi
          if ! kubectl -n argocd get secret holos-paas-config-robot >/dev/null 2>&1; then
            echo "Source Secret holos-paas-config-robot not found in argocd;" >&2
            echo "provision the holos+robot pull credential (keys username/password) and re-apply." >&2
            echo "Skipping holos-paas-config creation for now (the repository is registered once the source exists)." >&2
            exit 0
          fi
          # The username/password are read as their already-base64-encoded data values
          # and emitted into the new Secret's base64 `data` fields verbatim — NEVER
          # interpolated into YAML as raw scalars.  base64 of arbitrary bytes is always
          # YAML-safe, so a robot token containing quotes, backslashes, or newlines can
          # neither break the manifest nor alter the written value (a YAML-injection
          # vector a quoted stringData scalar would expose).  The static fields
          # (name/url/type/insecure) are known-safe constants.
          USERNAME_B64="$(kubectl -n argocd get secret holos-paas-config-robot -o jsonpath='{.data.username}')"
          PASSWORD_B64="$(kubectl -n argocd get secret holos-paas-config-robot -o jsonpath='{.data.password}')"
          if [ -z "$USERNAME_B64" ] || [ -z "$PASSWORD_B64" ]; then
            echo "ERROR: holos-paas-config-robot is missing the username or password key." >&2
            exit 1
          fi
          NAME_B64="$(printf %s 'holos-paas-config' | base64 | tr -d '\n')"
          URL_B64="$(printf %s 'oci://quay.holos.internal/holos/holos-paas-config' | base64 | tr -d '\n')"
          TYPE_B64="$(printf %s 'oci' | base64 | tr -d '\n')"
          INSECURE_B64="$(printf %s 'true' | base64 | tr -d '\n')"
          kubectl -n argocd create -f - <<EOF
          apiVersion: v1
          kind: Secret
          metadata:
            name: holos-paas-config
            namespace: argocd
            labels:
              argocd.argoproj.io/secret-type: repository
          type: Opaque
          data:
            name: ${NAME_B64}
            url: ${URL_B64}
            type: ${TYPE_B64}
            username: ${USERNAME_B64}
            password: ${PASSWORD_B64}
            insecure: ${INSECURE_B64}
          EOF
          echo "Secret holos-paas-config created in argocd."
        env:
        - name: HOME
          value: /tmp
        image: docker.io/alpine/kubectl:1.33.3
        name: bootstrap
        resources:
          limits:
            memory: 64Mi
          requests:
            cpu: 10m
            memory: 32Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        volumeMounts:
        - mountPath: /tmp
          name: tmp
      restartPolicy: Never
      securityContext:
        runAsGroup: 65534
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: holos-paas-config-repo-bootstrap
      volumes:
      - emptyDir: {}
        name: tmp
  ttlSecondsAfterFinished: 86400
