apiVersion: batch/v1
kind: Job
metadata:
  labels:
    app.kubernetes.io/name: nats-stream-bootstrap
  name: nats-stream-bootstrap
  namespace: nats
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nats-stream-bootstrap
    spec:
      automountServiceAccountToken: false
      containers:
      - command:
        - /bin/sh
        - -c
        - |-
          set -eu
          SERVER="nats://nats.nats.svc.cluster.local:4222"
          echo "Waiting for NATS at ${SERVER} ..."
          i=0
          until nats --server "${SERVER}" server check connection >/dev/null 2>&1; do
            i=$((i + 1))
            if [ "$i" -ge 60 ]; then
              echo "NATS did not become reachable in time" >&2
              exit 1
            fi
            sleep 2
          done
          echo "NATS is reachable; converging streams."
          converge_stream() {
            name="$1"
            subjects="$2"
            if nats --server "${SERVER}" stream info "${name}" >/dev/null 2>&1; then
              echo "Stream ${name} exists; converging config."
              nats --server "${SERVER}" stream edit --force \
                --subjects="${subjects}" --retention=work --storage=file "${name}"
            else
              echo "Creating stream ${name}."
              nats --server "${SERVER}" stream add --defaults \
                --subjects="${subjects}" --retention=work --storage=file "${name}"
            fi
          }
          converge_stream WEBHOOKS 'webhooks.raw.>'
          converge_stream TASKS 'tasks.>'
          echo "Stream bootstrap complete."
        env:
        - name: HOME
          value: /tmp
        image: natsio/nats-box:0.19.7
        name: bootstrap
        resources:
          limits:
            memory: 64Mi
          requests:
            cpu: 10m
            memory: 32Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        volumeMounts:
        - mountPath: /tmp
          name: tmp
        workingDir: /tmp
      restartPolicy: Never
      securityContext:
        runAsGroup: 65534
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      volumes:
      - emptyDir: {}
        name: tmp
  ttlSecondsAfterFinished: 86400
