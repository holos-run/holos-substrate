apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/component: project
    app.kubernetes.io/name: projects-project
    app.kubernetes.io/part-of: projects
  name: projects-project
  namespace: argocd
spec:
  destination:
    namespace: argocd
    server: https://kubernetes.default.svc
  project: projects
  source:
    directory:
      recurse: true
    path: clusters/k3d-holos/components/project
    repoURL: oci://quay.holos.internal/holos/holos-paas-config
    targetRevision: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - ServerSideApply=true
    - CreateNamespace=false
