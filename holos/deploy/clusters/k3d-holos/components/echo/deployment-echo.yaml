apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: echo
  name: echo
  namespace: echo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: echo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: echo
    spec:
      containers:
      - args:
        - netexec
        - --http-port=8080
        image: registry.k8s.io/e2e-test-images/agnhost:2.53
        name: echo
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
