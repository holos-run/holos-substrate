apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: default
  namespace: istio-gateways
spec:
  gatewayClassName: istio
  listeners:
  - allowedRoutes:
      namespaces:
        from: All
    hostname: '*.holos.localhost'
    name: http
    port: 80
    protocol: HTTP
  - allowedRoutes:
      namespaces:
        from: All
    hostname: '*.holos.localhost'
    name: https
    port: 443
    protocol: HTTPS
    tls:
      certificateRefs:
      - name: wildcard-holos-localhost
      mode: Terminate
