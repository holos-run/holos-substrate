apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  labels:
    app.kubernetes.io/name: quay
  name: quay-local-ca
  namespace: quay
spec:
  dnsNames:
  - quay-local-ca.quay.svc.cluster.local
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: local-ca
  secretName: quay-local-ca
