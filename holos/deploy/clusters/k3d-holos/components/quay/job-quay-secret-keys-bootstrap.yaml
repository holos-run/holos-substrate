apiVersion: batch/v1
kind: Job
metadata:
  labels:
    app.kubernetes.io/name: quay
  name: quay-secret-keys-bootstrap
  namespace: quay
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: quay
    spec:
      containers:
      - command:
        - /bin/sh
        - -c
        - |-
          set -eu
          if kubectl -n quay get secret quay-secret-keys >/dev/null 2>&1; then
            echo "Secret quay-secret-keys already exists; leaving it untouched."
            exit 0
          fi
          random_key() {
            head -c 256 /dev/urandom | base64 | tr -dc 'A-Za-z0-9' | cut -c 1-48
          }
          kubectl -n quay create secret generic quay-secret-keys \
            --from-literal=SECRET_KEY="$(random_key)" \
            --from-literal=DATABASE_SECRET_KEY="$(random_key)"
          echo "Secret quay-secret-keys created."
        env:
        - name: HOME
          value: /tmp
        image: docker.io/alpine/kubectl:1.33.3
        name: bootstrap
        resources:
          limits:
            memory: 64Mi
          requests:
            cpu: 10m
            memory: 32Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        volumeMounts:
        - mountPath: /tmp
          name: tmp
      restartPolicy: Never
      securityContext:
        runAsGroup: 65534
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: quay-secret-keys-bootstrap
      volumes:
      - emptyDir: {}
        name: tmp
