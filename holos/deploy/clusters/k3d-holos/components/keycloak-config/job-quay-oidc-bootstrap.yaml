apiVersion: batch/v1
kind: Job
metadata:
  labels:
    app.kubernetes.io/name: quay-oidc-bootstrap
  name: quay-oidc-bootstrap
  namespace: keycloak
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: quay-oidc-bootstrap
    spec:
      containers:
      - command:
        - /bin/sh
        - -c
        - |-
          set -eu
          random_secret() {
            head -c 256 /dev/urandom | base64 | tr -dc 'A-Za-z0-9' | cut -c 1-48
          }
          read_secret() {
            # Echo the decoded client_secret if the Secret exists in $1, else nothing.
            if kubectl -n "$1" get secret quay-oidc >/dev/null 2>&1; then
              kubectl -n "$1" get secret quay-oidc \
                -o jsonpath='{.data.client_secret}' | base64 -d
            fi
          }
          KC_SECRET="$(read_secret keycloak)"
          QUAY_SECRET="$(read_secret quay)"
          # If both copies already exist they MUST carry the same value — Keycloak and
          # Quay authenticate with the same client secret.  A mismatch (e.g. the two
          # namespaces were seeded independently) cannot be silently reconciled by a
          # create-if-absent Job that never overwrites, so fail loudly and let an
          # operator delete the wrong copy rather than leaving the two sides
          # permanently disagreeing.
          if [ -n "$KC_SECRET" ] && [ -n "$QUAY_SECRET" ] && [ "$KC_SECRET" != "$QUAY_SECRET" ]; then
            echo "ERROR: quay-oidc differs between the keycloak and quay namespaces." >&2
            echo "       Delete the incorrect copy so this Job can re-create it from the surviving one." >&2
            exit 1
          fi
          # Reuse whichever copy exists (they match by the check above) so a partial
          # prior run is completed with the same value; otherwise generate once.
          if [ -n "$KC_SECRET" ]; then
            CLIENT_SECRET="$KC_SECRET"
          elif [ -n "$QUAY_SECRET" ]; then
            CLIENT_SECRET="$QUAY_SECRET"
          else
            CLIENT_SECRET="$(random_secret)"
          fi
          [ "${#CLIENT_SECRET}" -eq 48 ]
          for ns in keycloak quay; do
            if kubectl -n "$ns" get secret quay-oidc >/dev/null 2>&1; then
              echo "Secret quay-oidc already exists in $ns; leaving it untouched."
              continue
            fi
            kubectl -n "$ns" create -f - <<EOF
          apiVersion: v1
          kind: Secret
          metadata:
            name: quay-oidc
            namespace: $ns
          stringData:
            client_secret: "${CLIENT_SECRET}"
          EOF
            echo "Secret quay-oidc created in $ns."
          done
        env:
        - name: HOME
          value: /tmp
        image: docker.io/alpine/kubectl:1.33.3
        name: bootstrap
        resources:
          limits:
            memory: 64Mi
          requests:
            cpu: 10m
            memory: 32Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        volumeMounts:
        - mountPath: /tmp
          name: tmp
      restartPolicy: Never
      securityContext:
        runAsGroup: 65534
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: quay-oidc-bootstrap
      volumes:
      - emptyDir: {}
        name: tmp
  ttlSecondsAfterFinished: 86400
