apiVersion: batch/v1
kind: Job
metadata:
  labels:
    app.kubernetes.io/name: holos-controller-keycloak-creds-bootstrap
  name: holos-controller-keycloak-creds-bootstrap
  namespace: keycloak
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: holos-controller-keycloak-creds-bootstrap
    spec:
      containers:
      - command:
        - /bin/sh
        - -c
        - |-
          set -eu
          random_secret() {
            head -c 256 /dev/urandom | base64 | tr -dc 'A-Za-z0-9' | cut -c 1-48
          }
          # Echo the decoded client secret from the keycloak-namespace copy, else from
          # the holos-controller-namespace credential Secret, else nothing.
          KC_SECRET=""
          if kubectl -n keycloak get secret svc-holos-controller-oidc >/dev/null 2>&1; then
            KC_SECRET="$(kubectl -n keycloak get secret svc-holos-controller-oidc \
              -o jsonpath='{.data.client_secret}' | base64 -d)"
          fi
          CTRL_SECRET=""
          if kubectl -n holos-controller get secret holos-controller-keycloak-creds >/dev/null 2>&1; then
            CTRL_SECRET="$(kubectl -n holos-controller get secret holos-controller-keycloak-creds \
              -o jsonpath='{.data.clientSecret}' | base64 -d)"
          fi
          if [ -n "$KC_SECRET" ] && [ -n "$CTRL_SECRET" ] && [ "$KC_SECRET" != "$CTRL_SECRET" ]; then
            echo "ERROR: svc-holos-controller-oidc (keycloak) and holos-controller-keycloak-creds (holos-controller) client secrets differ." >&2
            echo "       Delete the incorrect copy so this Job can re-create it from the surviving one." >&2
            exit 1
          fi
          if [ -n "$KC_SECRET" ]; then
            CLIENT_SECRET="$KC_SECRET"
          elif [ -n "$CTRL_SECRET" ]; then
            CLIENT_SECRET="$CTRL_SECRET"
          else
            CLIENT_SECRET="$(random_secret)"
          fi
          [ "${#CLIENT_SECRET}" -eq 48 ]
          # keycloak namespace: the single client_secret key keycloak-config-cli reads.
          if kubectl -n keycloak get secret svc-holos-controller-oidc >/dev/null 2>&1; then
            echo "Secret svc-holos-controller-oidc already exists in keycloak; leaving it untouched."
          else
            kubectl -n keycloak create -f - <<EOF
          apiVersion: v1
          kind: Secret
          metadata:
            name: svc-holos-controller-oidc
            namespace: keycloak
          stringData:
            client_secret: "${CLIENT_SECRET}"
          EOF
            echo "Secret svc-holos-controller-oidc created in keycloak."
          fi
          # holos-controller namespace: clientId + clientSecret, the credential keys the
          # controller reads (credentials.go).  clientId is the non-secret client id.
          if kubectl -n holos-controller get secret holos-controller-keycloak-creds >/dev/null 2>&1; then
            echo "Secret holos-controller-keycloak-creds already exists in holos-controller; leaving it untouched."
          else
            kubectl -n holos-controller create -f - <<EOF
          apiVersion: v1
          kind: Secret
          metadata:
            name: holos-controller-keycloak-creds
            namespace: holos-controller
          stringData:
            clientId: "svc-holos-controller"
            clientSecret: "${CLIENT_SECRET}"
          EOF
            echo "Secret holos-controller-keycloak-creds created in holos-controller."
          fi
        env:
        - name: HOME
          value: /tmp
        image: docker.io/alpine/kubectl:1.33.3
        name: bootstrap
        resources:
          limits:
            memory: 64Mi
          requests:
            cpu: 10m
            memory: 32Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        volumeMounts:
        - mountPath: /tmp
          name: tmp
      restartPolicy: Never
      securityContext:
        runAsGroup: 65534
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: holos-controller-keycloak-creds-bootstrap
      volumes:
      - emptyDir: {}
        name: tmp
  ttlSecondsAfterFinished: 86400
