apiVersion: batch/v1
kind: Job
metadata:
  labels:
    app.kubernetes.io/name: quay-user-password-bootstrap
  name: quay-user-password-bootstrap
  namespace: keycloak
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: quay-user-password-bootstrap
    spec:
      containers:
      - command:
        - /bin/sh
        - -c
        - |-
          set -eu
          random_secret() {
            head -c 256 /dev/urandom | base64 | tr -dc 'A-Za-z0-9' | cut -c 1-48
          }
          for name in svc-quay-resource-controller quay-admin; do
            if kubectl -n keycloak get secret "$name" >/dev/null 2>&1; then
              echo "Secret $name already exists in keycloak; leaving it untouched."
              continue
            fi
            PASSWORD="$(random_secret)"
            [ "${#PASSWORD}" -eq 48 ]
            kubectl -n keycloak create -f - <<EOF
          apiVersion: v1
          kind: Secret
          metadata:
            name: $name
            namespace: keycloak
          stringData:
            password: "${PASSWORD}"
          EOF
            echo "Secret $name created in keycloak."
          done
        env:
        - name: HOME
          value: /tmp
        image: docker.io/alpine/kubectl:1.33.3
        name: bootstrap
        resources:
          limits:
            memory: 64Mi
          requests:
            cpu: 10m
            memory: 32Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        volumeMounts:
        - mountPath: /tmp
          name: tmp
      restartPolicy: Never
      securityContext:
        runAsGroup: 65534
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: quay-user-password-bootstrap
      volumes:
      - emptyDir: {}
        name: tmp
  ttlSecondsAfterFinished: 86400
