apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    labels:
        app.kubernetes.io/component: control-plane
        app.kubernetes.io/name: my-project-control-plane
        app.kubernetes.io/part-of: my-project
    name: my-project-control-plane
    namespace: argocd
spec:
    destination:
        namespace: argocd
        server: https://kubernetes.default.svc
    project: projects
    source:
        directory:
            exclude: '**/workload/**'
            recurse: true
        path: clusters/k3d-holos/components
        repoURL: oci://quay.holos.internal/holos/my-project-config
        targetRevision: dev
    syncPolicy:
        automated:
            prune: true
            selfHeal: true
        syncOptions:
            - ServerSideApply=true
            - CreateNamespace=false
