apiVersion: networking.istio.io/v1
kind: ServiceEntry
metadata:
  labels:
    app.kubernetes.io/name: kargo
  name: auth-holos-localhost
  namespace: kargo
spec:
  endpoints:
  - address: default-istio.istio-gateways.svc.cluster.local
  hosts:
  - auth.holos.localhost
  ports:
  - name: tls
    number: 443
    protocol: TLS
  resolution: DNS
