apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: kubernetes-webhooks-server
    app.kubernetes.io/instance: kargo
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: kargo
    app.kubernetes.io/version: v1.10.3
    helm.sh/chart: kargo-1.10.3
  name: kargo-webhooks-server
  namespace: kargo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: kubernetes-webhooks-server
      app.kubernetes.io/instance: kargo
      app.kubernetes.io/name: kargo
  strategy:
    type: RollingUpdate
  template:
    metadata:
      annotations:
        configmap/checksum: 8f1374fd110006bc9504d8d79dce7d32977868b97ad75afc34ccadbf6702dd85
      labels:
        app.kubernetes.io/component: kubernetes-webhooks-server
        app.kubernetes.io/instance: kargo
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: kargo
        app.kubernetes.io/version: v1.10.3
        helm.sh/chart: kargo-1.10.3
    spec:
      containers:
      - args:
        - kubernetes-webhooks-server
        command:
        - /sbin/tini
        - --
        - /usr/local/bin/kargo
        env:
        - name: GOMEMLIMIT
          valueFrom:
            resourceFieldRef:
              containerName: webhooks-server
              divisor: "1"
              resource: limits.memory
        - name: GOMAXPROCS
          valueFrom:
            resourceFieldRef:
              containerName: webhooks-server
              divisor: "1"
              resource: requests.cpu
        envFrom:
        - configMapRef:
            name: kargo-webhooks-server
        image: ghcr.io/akuity/kargo:v1.10.3
        imagePullPolicy: IfNotPresent
        name: webhooks-server
        ports:
        - containerPort: 9443
          name: webhooks-server
          protocol: TCP
        resources:
          limits:
            memory: 128Mi
          requests:
            cpu: 20m
            memory: 64Mi
        securityContext:
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
        - mountPath: /tmp/k8s-webhook-server/serving-certs
          name: cert
          readOnly: true
      serviceAccount: kargo-webhooks-server
      volumes:
      - name: cert
        secret:
          defaultMode: 420
          secretName: kargo-webhooks-server-cert
