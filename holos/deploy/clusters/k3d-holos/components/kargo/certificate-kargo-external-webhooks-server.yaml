apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  labels:
    app.kubernetes.io/component: external-webhooks-server
    app.kubernetes.io/instance: kargo
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: kargo
    app.kubernetes.io/version: v1.10.3
    helm.sh/chart: kargo-1.10.3
  name: kargo-external-webhooks-server
  namespace: kargo
spec:
  dnsNames:
  - localhost
  issuerRef:
    group: cert-manager.io
    kind: Issuer
    name: kargo-selfsigned-cert-issuer
  secretName: kargo-external-webhooks-server-cert
