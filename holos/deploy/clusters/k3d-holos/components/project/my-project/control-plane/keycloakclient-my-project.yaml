apiVersion: keycloak.holos.run/v1alpha1
kind: KeycloakClient
metadata:
  labels:
    app.kubernetes.io/name: my-project
  name: my-project
  namespace: my-project
spec:
  clientId: https://my-project.holos.internal
  clientRoles:
  - clientRef: my-project
    role: my-project-owner
  - clientRef: my-project
    role: my-project-editor
  - clientRef: my-project
    role: my-project-viewer
  instanceRef:
    name: holos-keycloak
    namespace: keycloak
  redirectUris:
  - https://my-project.holos.internal/oauth2/callback
  secretRef:
    key: client_secret
    name: my-project-oidc
  type: confidential
  webOrigins:
  - https://my-project.holos.internal
