apiVersion: keycloak.holos.run/v1alpha1
kind: Group
metadata:
  labels:
    app.kubernetes.io/name: my-project
  name: my-project-roles-editor
  namespace: my-project
spec:
  clientRoles:
  - clientId: https://quay.holos.internal
    role: my-project-editor
  - clientRef: my-project
    role: my-project-editor
  - clientRef: my-app
    role: editor
  custodians:
  - path: projects/my-project/custodians/editor
  instanceRef:
    name: holos-keycloak
    namespace: keycloak
  path: projects/my-project/roles/editor
