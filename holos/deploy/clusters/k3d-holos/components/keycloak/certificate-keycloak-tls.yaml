apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: keycloak-tls
  namespace: keycloak
spec:
  dnsNames:
  - keycloak-service.keycloak.svc.cluster.local
  - keycloak-service.keycloak.svc
  - keycloak-service
  - auth.holos.localhost
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: local-ca
  secretName: keycloak-tls
