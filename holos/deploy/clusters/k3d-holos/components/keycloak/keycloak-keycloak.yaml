apiVersion: k8s.keycloak.org/v2beta1
kind: Keycloak
metadata:
  name: keycloak
  namespace: keycloak
spec:
  db:
    database: keycloak
    host: keycloak-db-rw
    passwordSecret:
      key: password
      name: keycloak-db-app
    port: 5432
    usernameSecret:
      key: username
      name: keycloak-db-app
    vendor: postgres
  hostname:
    hostname: https://auth.holos.internal
    strict: false
  http:
    httpEnabled: true
    httpPort: 8080
  ingress:
    enabled: false
  instances: 1
  proxy:
    headers: xforwarded
  resources:
    limits:
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 512Mi
