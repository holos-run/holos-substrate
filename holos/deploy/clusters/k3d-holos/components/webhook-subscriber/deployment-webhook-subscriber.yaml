apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: webhook-subscriber
  name: webhook-subscriber
  namespace: webhook-subscriber
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: webhook-subscriber
  template:
    metadata:
      labels:
        app.kubernetes.io/name: webhook-subscriber
    spec:
      automountServiceAccountToken: false
      containers:
      - args:
        - webhook-subscriber
        image: k3d-registry.holos.localhost:5000/holos-paas:dev
        imagePullPolicy: Always
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
        name: webhook-subscriber
        ports:
        - containerPort: 8080
          name: health
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8080
        resources:
          limits:
            memory: 64Mi
          requests:
            cpu: 10m
            memory: 32Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
      securityContext:
        runAsGroup: 65532
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
