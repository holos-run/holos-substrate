apiVersion: batch/v1
kind: Job
metadata:
  labels:
    app.kubernetes.io/name: keycloak-esso-config
  name: keycloak-esso-config-ebfefb6c
  namespace: keycloak
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak-esso-config
    spec:
      automountServiceAccountToken: false
      containers:
      - env:
        - name: KEYCLOAK_URL
          value: http://keycloak-service:8080
        - name: KEYCLOAK_USER
          valueFrom:
            secretKeyRef:
              key: username
              name: keycloak-initial-admin
        - name: KEYCLOAK_PASSWORD
          valueFrom:
            secretKeyRef:
              key: password
              name: keycloak-initial-admin
        - name: ESSO_IDP_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              key: client_secret
              name: esso-idp-oidc
        - name: ALICE_PASSWORD
          valueFrom:
            secretKeyRef:
              key: password
              name: esso-user-alice
        - name: KEYCLOAK_AVAILABILITYCHECK_ENABLED
          value: "true"
        - name: KEYCLOAK_AVAILABILITYCHECK_TIMEOUT
          value: 120s
        - name: IMPORT_FILES_LOCATIONS
          value: /config/esso.json
        - name: IMPORT_VARSUBSTITUTION_ENABLED
          value: "true"
        - name: JAVA_OPTS
          value: -Djava.io.tmpdir=/tmp
        image: docker.io/adorsys/keycloak-config-cli:6.5.1-26.5.5
        name: keycloak-esso-config
        resources:
          limits:
            memory: 512Mi
          requests:
            cpu: 50m
            memory: 256Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        volumeMounts:
        - mountPath: /config
          name: config
          readOnly: true
        - mountPath: /tmp
          name: tmp
      restartPolicy: Never
      securityContext:
        runAsGroup: 65534
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      volumes:
      - configMap:
          name: keycloak-esso-realm-config
        name: config
      - emptyDir: {}
        name: tmp
  ttlSecondsAfterFinished: 86400
