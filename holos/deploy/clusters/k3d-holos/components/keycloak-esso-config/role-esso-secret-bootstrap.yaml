apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  labels:
    app.kubernetes.io/name: esso-secret-bootstrap
  name: esso-secret-bootstrap
  namespace: keycloak
rules:
- apiGroups:
  - ""
  resourceNames:
  - esso-idp-oidc
  - esso-user-alice
  resources:
  - secrets
  verbs:
  - get
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - create
