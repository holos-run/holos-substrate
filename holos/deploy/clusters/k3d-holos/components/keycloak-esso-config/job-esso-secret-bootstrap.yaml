apiVersion: batch/v1
kind: Job
metadata:
  labels:
    app.kubernetes.io/name: esso-secret-bootstrap
  name: esso-secret-bootstrap
  namespace: keycloak
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: esso-secret-bootstrap
    spec:
      containers:
      - command:
        - /bin/sh
        - -c
        - |-
          set -eu
          random_secret() {
            head -c 256 /dev/urandom | base64 | tr -dc 'A-Za-z0-9' | cut -c 1-48
          }
          create_if_absent() {
            # $1 = Secret name, $2 = data key.  Generate a value and create the Secret
            # only if it does not already exist; never overwrite an existing one.
            name="$1"
            key="$2"
            if kubectl -n keycloak get secret "$name" >/dev/null 2>&1; then
              echo "Secret $name already exists in keycloak; leaving it untouched."
              return 0
            fi
            value="$(random_secret)"
            [ "${#value}" -eq 48 ]
            kubectl -n keycloak create -f - <<EOF
          apiVersion: v1
          kind: Secret
          metadata:
            name: $name
            namespace: keycloak
          stringData:
            $key: "${value}"
          EOF
            echo "Secret $name created in keycloak."
          }
          create_if_absent esso-idp-oidc client_secret
          create_if_absent esso-user-alice password
        env:
        - name: HOME
          value: /tmp
        image: docker.io/alpine/kubectl:1.33.3
        name: bootstrap
        resources:
          limits:
            memory: 64Mi
          requests:
            cpu: 10m
            memory: 32Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        volumeMounts:
        - mountPath: /tmp
          name: tmp
      restartPolicy: Never
      securityContext:
        runAsGroup: 65534
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: esso-secret-bootstrap
      volumes:
      - emptyDir: {}
        name: tmp
  ttlSecondsAfterFinished: 86400
