apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  labels:
    app.kubernetes.io/name: my-project
  name: project-config
  namespace: my-project
spec:
  promotionTemplate:
    spec:
      steps:
      - config:
          apps:
          - name: my-project
            namespace: argocd
            sources:
            - desiredRevision: ${{ imageFrom("quay.holos.localhost/my-project/my-project-config").Digest
                }}
              repoURL: oci://quay.holos.localhost/my-project/my-project-config
              updateTargetRevision: true
        uses: argocd-update
  requestedFreight:
  - origin:
      kind: Warehouse
      name: my-project
    sources:
      direct: true
