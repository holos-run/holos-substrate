apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    kargo.akuity.io/authorized-stage: my-project:project-config
  labels:
    app.kubernetes.io/name: my-project
  name: my-project
  namespace: argocd
spec:
  destination:
    namespace: my-project
    server: https://kubernetes.default.svc
  project: my-project
  source:
    path: .
    repoURL: oci://quay.holos.localhost/my-project/my-project-config
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=false
