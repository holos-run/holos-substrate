apiVersion: batch/v1
kind: Job
metadata:
  labels:
    app.kubernetes.io/name: my-project-quay-webhook-bootstrap
  name: my-project-quay-webhook-bootstrap
  namespace: my-project
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: my-project-quay-webhook-bootstrap
    spec:
      containers:
      - command:
        - /bin/sh
        - -c
        - |-
          set -eu
          if kubectl -n my-project get secret my-project-quay-webhook >/dev/null 2>&1; then
            echo "Secret my-project-quay-webhook already exists; leaving it untouched."
            exit 0
          fi
          random_key() {
            head -c 256 /dev/urandom | base64 | tr -dc 'A-Za-z0-9' | cut -c 1-48
          }
          TOKEN="$(random_key)"
          [ "${#TOKEN}" -eq 48 ]
          kubectl -n my-project create -f - <<EOF
          apiVersion: v1
          kind: Secret
          metadata:
            name: my-project-quay-webhook
            namespace: my-project
          stringData:
            secret: "${TOKEN}"
          EOF
          echo "Secret my-project-quay-webhook created."
        env:
        - name: HOME
          value: /tmp
        image: docker.io/alpine/kubectl:1.33.3
        name: bootstrap
        resources:
          limits:
            memory: 64Mi
          requests:
            cpu: 10m
            memory: 32Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        volumeMounts:
        - mountPath: /tmp
          name: tmp
      restartPolicy: Never
      securityContext:
        runAsGroup: 65534
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: my-project-quay-webhook-bootstrap
      volumes:
      - emptyDir: {}
        name: tmp
  ttlSecondsAfterFinished: 86400
