apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  labels:
    app.kubernetes.io/name: my-project-quay-bootstrap
  name: my-project-quay-bootstrap-project
  namespace: my-project
rules:
- apiGroups:
  - kargo.akuity.io
  resourceNames:
  - my-project
  resources:
  - projectconfigs
  verbs:
  - get
- apiGroups:
  - ""
  resourceNames:
  - my-project-quay-webhook
  - my-project-config-image-creds
  resources:
  - secrets
  verbs:
  - get
  - patch
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - create
