# buf module configuration (ADR-14). The .proto sources under proto/ are the
# single source of truth for every NATS JetStream message; the Go types under
# internal/gen/ are generated from them and never hand-edited. `buf lint`
# enforces the style conventions and `buf breaking` (run in CI against the
# main branch) makes a wire-incompatible change a build failure rather than a
# production surprise on the at-least-once pipeline.
version: v2
modules:
  - path: proto
lint:
  use:
    - STANDARD
breaking:
  use:
    - FILE
