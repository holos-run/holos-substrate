# RBAC for the holos-controller manager: the generated ClusterRole (role.yaml)
# plus its binding to the manager service account, the leader-election Role, and
# the service account itself.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - service_account.yaml
  - role.yaml
  - role_binding.yaml
  - leader_election_role.yaml
  - leader_election_role_binding.yaml
