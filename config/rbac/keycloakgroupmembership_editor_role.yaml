---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: keycloakgroupmembership-editor-role
# Deliberately not aggregated to admin/edit yet. ADR-24 requires rendered-object
# admission protection before tenants receive write access to this Kind.
rules:
  - apiGroups:
      - keycloak.holos.run
    resources:
      - keycloakgroupmemberships
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
