apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: holos-controller-leader-election-rolebinding
  namespace: holos-controller
  labels:
    app.kubernetes.io/name: holos-controller
    app.kubernetes.io/managed-by: kustomize
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: holos-controller-leader-election-role
subjects:
  - kind: ServiceAccount
    name: holos-controller-manager
    namespace: holos-controller
