apiVersion: apps/v1
kind: Deployment
metadata:
  name: holos-authenticator-manager
  labels:
    app.kubernetes.io/name: holos-authenticator
    app.kubernetes.io/managed-by: kustomize
    control-plane: authenticator-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      control-plane: authenticator-manager
  template:
    metadata:
      labels:
        control-plane: authenticator-manager
    spec:
      serviceAccountName: holos-authenticator
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: authenticator:dev
          imagePullPolicy: Always
          args:
            - --leader-elect
            - --health-probe-bind-address=:8081
            - --metrics-bind-address=:8080
            - --grpc-bind-address=:9000
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: grpc
              containerPort: 9000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
      terminationGracePeriodSeconds: 10
