# RBAC for the holos-controller manager: the generated ClusterRole (role.yaml)
# plus its bindings, the manager service account, leader-election RBAC, and
# helper roles shipped with the controller install.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - service_account.yaml
  - role.yaml
  - role_binding.yaml
  - groupmembership_editor_role.yaml
  - groupmembership_viewer_role.yaml
  - leader_election_role.yaml
  - leader_election_role_binding.yaml
  - metrics_reader_role.yaml
