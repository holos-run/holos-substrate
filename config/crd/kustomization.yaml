# This kustomization aggregates the service-specific CRD bases. Consumers that
# need only one service's API surface can render config/crd/holos-controller or
# config/crd/holos-authenticator directly.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - holos-controller
  - holos-authenticator
