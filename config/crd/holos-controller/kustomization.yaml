# This kustomization is the holos-controller CRD base. It includes every
# holos-controller API group and deliberately excludes authenticator.holos.run,
# which is served by the separate holos-authenticator binary.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - bases/quay.holos.run_organizations.yaml
  - bases/quay.holos.run_repositories.yaml
  - bases/keycloak.holos.run_instances.yaml
  - bases/keycloak.holos.run_groups.yaml
  - bases/keycloak.holos.run_groupmemberships.yaml
  - bases/keycloak.holos.run_users.yaml
  - bases/keycloak.holos.run_clients.yaml
  - bases/security.holos.run_referencegrants.yaml
