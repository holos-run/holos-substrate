name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on force-pushed PR branches. Push events key the
# group by commit SHA so runs on main are neither canceled nor queued out by
# later pushes — every merged commit gets a complete CI record.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.ref || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  guardrails:
    name: Guardrails
    runs-on: ubuntu-latest
    steps:
      # Pinned to the full commit SHA of v4.3.1 for supply-chain hardening.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # materia.ai is the label/annotation domain of a sibling project; it
      # must never leak into this repository's platform configuration or Go
      # code. Platform-owned label keys use the holos.run domain instead
      # (see the Conventions section of AGENTS.md). Scoped to holos/ and Go
      # sources rather than the whole tree — and excluding markdown — so
      # documentation (including this workflow and
      # holos/docs/component-guidelines.md) may name the forbidden domain
      # when describing the rule.
      - name: no materia.ai label domain
        run: |
          set -euo pipefail
          found=0
          if grep -rniI --exclude='*.md' 'materia\.ai' holos/; then found=1; fi
          if grep -rniI --include='*.go' --include='go.mod' --include='go.sum' 'materia\.ai' .; then found=1; fi
          if [ "${found}" -ne 0 ]; then
            echo "ERROR: materia.ai references found (listed above)." >&2
            echo "       Platform-owned label keys use the holos.run domain" >&2
            echo "       (see the Conventions section of AGENTS.md)." >&2
            exit 1
          fi
          echo "No materia.ai references in holos/ or Go code."

  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      # Pinned to the full commit SHA of v4.3.1 for supply-chain hardening.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # Pinned to the full commit SHA of v5.2.0 for supply-chain hardening.
      # go-version-file reads the directive from go.mod so the toolchain
      # tracks the module without a second source of truth.
      - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
        with:
          go-version-file: go.mod

      # gofmt must be a *gate*, not a mutation. The Makefile `test` target
      # runs `go fmt` (which rewrites files and exits 0), so relying on it in
      # CI would let unformatted code pass after being silently formatted in
      # the runner. Check cleanliness explicitly instead: `gofmt -l` lists
      # files needing formatting, and any output fails the job.
      - name: gofmt
        run: |
          set -euo pipefail
          unformatted="$(gofmt -l .)"
          if [ -n "${unformatted}" ]; then
            echo "The following files are not gofmt-clean:" >&2
            echo "${unformatted}" >&2
            exit 1
          fi
          echo "All Go files are gofmt-clean."

      - name: vet
        run: go vet ./...

      # Run the race-enabled suite directly rather than via `make test`, whose
      # fmt/vet prerequisites are already covered by the steps above.
      - name: test
        run: go test -race -coverprofile cover.out ./...

      # Pinned to the full commit SHA of v8.0.0 for supply-chain hardening.
      - name: golangci-lint
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
        with:
          version: v2.8.0

  proto:
    name: Protobuf
    runs-on: ubuntu-latest
    steps:
      # Pinned to the full commit SHA of v4.3.1 for supply-chain hardening.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # go is needed to install protoc-gen-go (the buf.gen.yaml plugin) at the
      # exact version go.mod pins, so the generated output is reproducible.
      # Pinned to the full commit SHA of v5.2.0 for supply-chain hardening.
      - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
        with:
          go-version-file: go.mod

      # Install the code-gen plugin referenced by buf.gen.yaml at the module's
      # protobuf version so `buf generate` renders byte-for-byte what a developer
      # gets locally; a version skew would surface as a spurious diff below.
      - name: install protoc-gen-go
        run: |
          set -euo pipefail
          version="$(go list -m -f '{{.Version}}' google.golang.org/protobuf)"
          go install "google.golang.org/protobuf/cmd/protoc-gen-go@${version}"

      # Pinned to the full commit SHA of v1.50.0 for supply-chain hardening.
      - uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0
        with:
          github_token: ${{ github.token }}

      # buf lint gates the .proto style conventions (ADR-14).
      - name: buf lint
        run: buf lint

      # Fetch the PR base branch so buf breaking can diff against it, and detect
      # whether the base already has a Buf module. buf breaking errors with "had
      # no .proto files" when the base predates the Buf module (e.g. the very PR
      # that introduces protobuf support), so the breaking check below is gated
      # on the base actually carrying buf.yaml.
      - name: detect base Buf module
        if: github.event_name == 'pull_request'
        id: base_buf
        run: |
          set -euo pipefail
          git fetch --depth=1 origin "${{ github.base_ref }}"
          if git cat-file -e "origin/${{ github.base_ref }}:buf.yaml" 2>/dev/null; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "Base branch ${{ github.base_ref }} has no buf.yaml; skipping buf breaking (nothing to break against)."
          fi

      # buf breaking makes a wire-incompatible schema change a build failure
      # against the PR base rather than a production surprise on the
      # at-least-once pipeline (ADR-14). Skipped on push to main (no PR base) and
      # on the PR that first introduces the Buf module (no base module to diff).
      - name: buf breaking
        if: github.event_name == 'pull_request' && steps.base_buf.outputs.present == 'true'
        run: buf breaking --against ".git#branch=origin/${{ github.base_ref }}"

      # The .proto under proto/ is the single source of truth; the Go under
      # internal/gen/ is a generated build output that must match it. The script
      # regenerates and fails on any diff — the same diff-clean gate
      # scripts/render applies to rendered manifests (ADR-14).
      - name: generated code is diff-clean
        run: ./scripts/generate

  scripts:
    name: Shell scripts
    runs-on: ubuntu-latest
    steps:
      # Pinned to the full commit SHA of v4.3.1 for supply-chain hardening.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # shellcheck is preinstalled on ubuntu-latest runners. Glob the whole
      # directory so new scripts are linted automatically. This also means CI
      # hard-fails if a non-script file or subdirectory is ever added to
      # scripts/ (shellcheck errors on anything without a recognizable
      # shebang) — an intentional tripwire that keeps scripts/ scripts-only.
      - name: shellcheck
        run: shellcheck scripts/*

      # The three scripts each carry a verbatim copy of check_prereq so they
      # stay standalone (see the NOTE blocks in each script). This check makes
      # that invariant self-enforcing: the copies must stay
      # character-identical.
      - name: check_prereq copies are character-identical
        run: |
          set -euo pipefail
          # Extract the function and guard against the sed range silently
          # misfiring: an empty extraction means the signature line never
          # matched, and a well-formed extraction ends at a bare '}' and
          # contains exactly one function-signature line (check_prereq's
          # own). Anything else means sed ran past the function's closing
          # brace (e.g. it was reformatted) into a later function or
          # end-of-file. The diff below remains the backstop.
          extract() {
            local out
            out="${RUNNER_TEMP}/check_prereq.$(basename "$1")"
            sed -n '/^check_prereq() {$/,/^}$/p' "$1" > "$out"
            if ! test -s "$out"; then
              echo "ERROR: could not extract check_prereq from $1." >&2
              echo "       Was the 'check_prereq() {' signature line reformatted?" >&2
              exit 1
            fi
            if [ "$(tail -n 1 "$out")" != "}" ] || [ "$(grep -c '() {$' "$out")" != 1 ]; then
              echo "ERROR: check_prereq extraction from $1 did not stop at the function's closing brace." >&2
              echo "       Was the function's closing '}' line reformatted?" >&2
              exit 1
            fi
          }
          extract scripts/local-ca
          extract scripts/local-dns
          extract scripts/local-k3d
          fail() {
            echo "ERROR: check_prereq in $1 diverged from scripts/local-ca." >&2
            echo "       The three copies must stay character-identical (see the NOTE blocks)." >&2
            exit 1
          }
          diff -u "${RUNNER_TEMP}/check_prereq.local-ca" "${RUNNER_TEMP}/check_prereq.local-dns" || fail scripts/local-dns
          diff -u "${RUNNER_TEMP}/check_prereq.local-ca" "${RUNNER_TEMP}/check_prereq.local-k3d" || fail scripts/local-k3d
          echo "check_prereq copies are identical."
