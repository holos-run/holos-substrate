name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on force-pushed PR branches. Push events key the
# group by commit SHA so runs on main are neither canceled nor queued out by
# later pushes — every merged commit gets a complete CI record.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.ref || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  scripts:
    name: Shell scripts
    runs-on: ubuntu-latest
    steps:
      # Pinned to the full commit SHA of v4.3.1 for supply-chain hardening.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # shellcheck is preinstalled on ubuntu-latest runners. Glob the whole
      # directory so new scripts are linted automatically. This also means CI
      # hard-fails if a non-script file or subdirectory is ever added to
      # scripts/ (shellcheck errors on anything without a recognizable
      # shebang) — an intentional tripwire that keeps scripts/ scripts-only.
      - name: shellcheck
        run: shellcheck scripts/*

      # The three scripts each carry a verbatim copy of check_prereq so they
      # stay standalone (see the NOTE blocks in each script). This check makes
      # that invariant self-enforcing: the copies must stay
      # character-identical.
      - name: check_prereq copies are character-identical
        run: |
          set -euo pipefail
          # Extract the function and guard against the sed range silently
          # misfiring: an empty extraction means the signature line never
          # matched, and an extraction that does not end at a bare '}'
          # indicates sed ran past the function's closing brace (e.g. it was
          # reformatted). These guards are best-effort; the diff below
          # remains the backstop for anything they miss.
          extract() {
            local out="${RUNNER_TEMP}/check_prereq.$(basename "$1")"
            sed -n '/^check_prereq() {$/,/^}$/p' "$1" > "$out"
            if ! test -s "$out"; then
              echo "ERROR: could not extract check_prereq from $1." >&2
              echo "       Was the 'check_prereq() {' signature line reformatted?" >&2
              exit 1
            fi
            if [ "$(tail -n 1 "$out")" != "}" ]; then
              echo "ERROR: check_prereq extraction from $1 did not stop at a closing brace." >&2
              echo "       Was the function's closing '}' line reformatted?" >&2
              exit 1
            fi
          }
          extract scripts/local-ca
          extract scripts/local-dns
          extract scripts/local-k3d
          fail() {
            echo "ERROR: check_prereq in $1 diverged from scripts/local-ca." >&2
            echo "       The three copies must stay character-identical (see the NOTE blocks)." >&2
            exit 1
          }
          diff -u "${RUNNER_TEMP}/check_prereq.local-ca" "${RUNNER_TEMP}/check_prereq.local-dns" || fail scripts/local-dns
          diff -u "${RUNNER_TEMP}/check_prereq.local-ca" "${RUNNER_TEMP}/check_prereq.local-k3d" || fail scripts/local-k3d
          echo "check_prereq copies are identical."
