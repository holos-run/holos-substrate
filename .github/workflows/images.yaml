name: Images

# Manual-only multi-arch image build/publish dispatcher.
#
# This workflow is deliberately NOT triggered on push, pull_request, or tags:
# ci.yaml owns the automatic, registry-free build/test path, while this
# workflow needs registry write and is dispatched by hand from the Actions tab
# (or `gh workflow run`) against a caller-supplied Git ref. Keep the trigger as
# workflow_dispatch only.
#
# Discrete per-image jobs. Each image is built by its own job that calls the
# reusable build-image.yaml workflow. The `image` input selects which to run, so
# you can publish holos-paas only, holos-controller only, or both — building one
# never forces the other. The shared build/publish/validation logic lives once
# in build-image.yaml.
#
# Security model (enforced in build-image.yaml, which is resolved from this same
# trusted commit — not from the caller-supplied `ref`):
#
#  * Admission control. Building a caller-supplied `ref` (a SHA/branch/tag) is
#    the explicit purpose of this workflow, so the checkout source cannot be
#    pinned to `github.ref`. The boundary instead is the `publish-images`
#    GitHub Environment each build job runs in: configure it with REQUIRED
#    REVIEWERS so every dispatch — whatever `ref` it names — is approved by a
#    human before the publish job runs (Settings -> Environments). Environment
#    *branch/tag deployment policies* gate only the workflow run ref, NOT the
#    checkout input, so required reviewers (not a branch policy) are the control
#    that covers an arbitrary `ref`. `workflow_dispatch` alone only gates on
#    write access, which is not a strong enough boundary for image publishing.
#  * Token confinement. The build job authenticates with the built-in
#    GITHUB_TOKEN, so the `registry` input is constrained to an allowlist (a
#    `type: choice` here, re-checked in build-image.yaml) — the token is never
#    sent to an arbitrary caller-supplied host.
#  * Injection. All dispatch inputs reach shell steps via `env:` (never
#    interpolated into `run:` script bodies), are rejected if they contain
#    CR/LF, and the `tag` input is validated against the Docker tag grammar
#    before use — closing the script- and env-injection vectors inherent to
#    untrusted `workflow_dispatch` inputs.
on:
  workflow_dispatch:
    inputs:
      image:
        description: >-
          Which image(s) to build and publish. Each image is a discrete job;
          select one to avoid building the other.
        required: true
        default: both
        type: choice
        options:
          - both
          - holos-paas
          - holos-controller
      ref:
        description: >-
          Git reference to build: a commit SHA, a branch (main or
          refs/heads/main), or a tag (v0.1.0 or refs/tags/v0.1.0). Passed to
          actions/checkout's ref.
        required: true
        default: main
        type: string
      tag:
        description: >-
          Image tag to publish. Defaults to the short SHA of the resolved ref
          when left blank.
        required: false
        default: ""
        type: string
      registry:
        description: >-
          Registry host to publish to. Must be one of the allowlisted hosts
          (currently only ghcr.io). The host is restricted by an explicit
          allowlist because the job authenticates with the built-in
          GITHUB_TOKEN — sending that token to an arbitrary caller-supplied
          host would leak it, so a future Quay/other target is added by
          extending the allowlist (a one-line change), not by accepting
          free-form input.
        required: false
        default: ghcr.io
        type: choice
        options:
          - ghcr.io

# Minimal default permissions; each calling job widens to packages: write via
# the reusable workflow's own permissions block (capped by these).
permissions:
  contents: read
  packages: write

jobs:
  holos-paas:
    if: ${{ inputs.image == 'holos-paas' || inputs.image == 'both' }}
    uses: ./.github/workflows/build-image.yaml
    permissions:
      contents: read
      packages: write
    with:
      image: holos-paas
      make_target: docker-buildx
      repo_var: IMAGE_REPO
      tag_var: IMAGE_TAG
      ref: ${{ inputs.ref }}
      tag: ${{ inputs.tag }}
      registry: ${{ inputs.registry }}

  holos-controller:
    if: ${{ inputs.image == 'holos-controller' || inputs.image == 'both' }}
    uses: ./.github/workflows/build-image.yaml
    permissions:
      contents: read
      packages: write
    with:
      image: holos-controller
      make_target: controller-docker-buildx
      repo_var: CONTROLLER_IMAGE_REPO
      tag_var: CONTROLLER_IMAGE_TAG
      ref: ${{ inputs.ref }}
      tag: ${{ inputs.tag }}
      registry: ${{ inputs.registry }}
