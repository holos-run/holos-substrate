name: Build image

# Reusable multi-arch image build/publish for ONE module image.
#
# This is the single source of build/publish logic shared by the discrete
# per-image jobs in images.yaml. It is `workflow_call`-only: it is never
# dispatched directly. The caller (images.yaml) invokes it once per selected
# image, passing the image's make target and the make variables that point that
# target at the dispatched registry/repo.
#
# Why a reusable workflow (not a composite action): a local reusable workflow
# referenced as `./.github/workflows/build-image.yaml` is resolved from the SAME
# commit as the calling workflow run — i.e. the branch/tag the run was
# dispatched on (trusted, normally main), NOT the caller-supplied `ref` input.
# So the input validation below stays trusted. Only `actions/checkout` (at the
# untrusted `ref`) and the `make` target it runs are governed by that ref —
# exactly the accepted "publish token + untrusted ref" trade-off, gated by the
# publish-images Environment. A composite action would instead load from the
# checked-out untrusted tree and could neuter this validation.
on:
  workflow_call:
    inputs:
      image:
        description: Short image name (e.g. holos-controller), used as the ghcr repo leaf.
        required: true
        type: string
      make_target:
        description: The multi-arch make target to drive the build (e.g. controller-docker-buildx).
        required: true
        type: string
      repo_var:
        description: Make variable that sets the image repo (e.g. CONTROLLER_IMAGE_REPO).
        required: true
        type: string
      tag_var:
        description: Make variable that sets the image tag (e.g. CONTROLLER_IMAGE_TAG).
        required: true
        type: string
      ref:
        description: Git reference to build (SHA, branch, or tag); passed to checkout.
        required: true
        type: string
      tag:
        description: Image tag to publish; resolved to the short SHA when blank.
        required: false
        default: ""
        type: string
      registry:
        description: Registry host to publish to; must be allowlisted below.
        required: false
        default: ghcr.io
        type: string

jobs:
  build:
    name: ${{ inputs.image }}
    runs-on: ubuntu-latest
    # Gate package publishing behind a GitHub Environment so org policy
    # (required reviewers, deployment branch/tag restrictions) governs which
    # refs may be published — workflow_dispatch alone is not a sufficient
    # boundary. Each per-image call enters the environment independently, so a
    # selective dispatch (one image) approves and builds only that image. The
    # environment may be created with no protection rules to keep the workflow
    # functional, then hardened in repo settings without touching this file.
    environment: publish-images
    permissions:
      contents: read
      # Required to push image packages to ghcr.io with GITHUB_TOKEN.
      packages: write
    steps:
      # Pinned to the full commit SHA of v4.3.1 for supply-chain hardening
      # (matches ci.yaml). Checks out the dispatched ref so the build reflects
      # exactly that commit/branch/tag.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ inputs.ref }}

      # Validate the dispatch inputs once, up front, before any value reaches a
      # build/push command. `registry` and `tag` originate from an untrusted
      # workflow_dispatch input, so they are surfaced via `env:` (never
      # interpolated into the script body) and checked here; anything that does
      # not pass fails the run rather than flowing into a shell command, a
      # `docker login`, or a `$GITHUB_ENV` record. Validated values are
      # re-exported to $GITHUB_ENV so later steps consume vetted, quoted shell
      # variables instead of raw `${{ inputs.* }}` interpolation.
      #
      # REGISTRY_ALLOWLIST is the trusted set of hosts the GITHUB_TOKEN may be
      # sent to. The caller's `registry` input is already a `type: choice`
      # constrained to this same set, so this is defense-in-depth; extend both
      # to add a new target. Never accept a free-form registry host here — the
      # login step sends GITHUB_TOKEN to whatever host wins, so an arbitrary
      # value would leak the token.
      - name: Validate and resolve inputs
        env:
          IN_REGISTRY: ${{ inputs.registry }}
          IN_TAG: ${{ inputs.tag }}
          REGISTRY_ALLOWLIST: |
            ghcr.io
        run: |
          set -euo pipefail
          # Reject any value carrying a CR or LF before pattern-matching: grep
          # is line-oriented, so a multi-line value with a benign first line
          # could otherwise slip past `^...$` and then inject extra records
          # when written to $GITHUB_ENV / $GITHUB_OUTPUT. `case` matches the
          # whole string (newlines included), closing that vector.
          case "${IN_REGISTRY}${IN_TAG}" in
            *[$'\n\r']*)
              echo "::error::inputs must not contain newline characters" >&2
              exit 1
              ;;
          esac
          # Registry host must be one of the allowlisted trusted hosts — the
          # GITHUB_TOKEN is only ever sent to this value at login.
          if ! grep -Fxq "${IN_REGISTRY}" <<<"${REGISTRY_ALLOWLIST}"; then
            echo "::error::Registry '${IN_REGISTRY}' is not in the allowlist" >&2
            exit 1
          fi
          # Docker tag grammar: [A-Za-z0-9_][A-Za-z0-9_.-]{0,127}. An empty tag
          # is allowed here and resolved to the short SHA below.
          if [ -n "${IN_TAG}" ] \
            && ! printf '%s' "${IN_TAG}" \
              | grep -Eq '^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$'; then
            echo "::error::Invalid image tag: '${IN_TAG}'" >&2
            exit 1
          fi
          tag="${IN_TAG}"
          if [ -z "${tag}" ]; then
            tag="$(git rev-parse --short HEAD)"
          fi
          # Re-export the vetted values for downstream steps. printf (not echo)
          # writes them so no value is re-interpreted by the shell. Both values
          # are now guaranteed single-line and pattern-clean.
          {
            printf 'REGISTRY=%s\n' "${IN_REGISTRY}"
            printf 'IMAGE_TAG_RESOLVED=%s\n' "${tag}"
          } >> "${GITHUB_ENV}"

      # Provision a docker-container-driver buildx builder — the CI equivalent
      # of HOL-1333's docker-buildx-builder make target. The make target's own
      # bootstrap is a compatible no-op against this builder (buildx uses the
      # active builder set up here). No QEMU (docker/setup-qemu-action) is
      # needed: both Dockerfiles pin the builder stage to $BUILDPLATFORM and
      # cross-compile via the Go toolchain to the target arch, so amd64 and
      # arm64 outputs are produced without emulating the target architecture.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      # Authenticate to the registry. ghcr.io needs no extra secrets: the
      # built-in GITHUB_TOKEN plus packages: write is sufficient. REGISTRY is
      # the validated host exported above.
      - name: Log in to registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Drive the build through the multi-arch make target (HOL-1333) so the
      # buildx invocation stays single-sourced between local hosts and CI. The
      # target is push-only (a manifest list cannot be --load-ed into the local
      # daemon) and emits a multi-arch (linux/amd64 + linux/arm64) OCI image
      # index to the registry. All dynamic values come from env (validated
      # REGISTRY/IMAGE_TAG_RESOLVED, the trusted github context, and the
      # static caller inputs), quoted, so nothing is interpolated into the
      # script body.
      #
      # IMAGE_NAME (not IMAGE) deliberately avoids colliding with any Makefile
      # `?=` image variable: a shell env var of the same name counts as
      # "already defined" for `?=`, so it would shadow the computed value and
      # the build would tag a bare `holos-controller` (->
      # docker.io/library/holos-controller, a 401). The repo/tag are set via
      # the target's own REPO_VAR/TAG_VAR.
      - name: Build and push
        env:
          MAKE_TARGET: ${{ inputs.make_target }}
          REPO_VAR: ${{ inputs.repo_var }}
          TAG_VAR: ${{ inputs.tag_var }}
          OWNER: ${{ github.repository_owner }}
          IMAGE_NAME: ${{ inputs.image }}
        run: |
          set -euo pipefail
          make "${MAKE_TARGET}" \
            "${REPO_VAR}=${REGISTRY}/${OWNER}/${IMAGE_NAME}" \
            "${TAG_VAR}=${IMAGE_TAG_RESOLVED}"

      # Surface both platforms in the run log as a published-artifact sanity
      # check (the image index should list linux/amd64 and linux/arm64).
      - name: Inspect published image
        env:
          OWNER: ${{ github.repository_owner }}
          IMAGE_NAME: ${{ inputs.image }}
        run: |
          set -euo pipefail
          docker buildx imagetools inspect \
            "${REGISTRY}/${OWNER}/${IMAGE_NAME}:${IMAGE_TAG_RESOLVED}"
